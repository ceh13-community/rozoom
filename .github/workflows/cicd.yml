name: "CI/CD for Tauri App"

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch: {}

defaults:
  run:
    working-directory: ./dashboard-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  pr_checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Static checks (format + lint + types)
        run: pnpm run check

      - name: Run tests
        run: pnpm vitest run

      - name: Build web app
        run: pnpm run build

  e2e_smoke:
    if: github.event_name == 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build web app
        run: pnpm run build

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e smoke
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard-app/playwright-report
          if-no-files-found: ignore

  publish-tauri:
    if: github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            label: "macOS ARM64"
          # Linux x86_64 (DEB + RPM; AppImage built separately below)
          - platform: "ubuntu-22.04"
            args: "--bundles deb,rpm"
            label: "Linux x64"
          - platform: "windows-latest"
            args: "--bundles msi,nsis"
            label: "Windows x64"

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Resolve app version
        shell: bash
        working-directory: ./dashboard-app
        run: echo "APP_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version' | tr -d '\r\n')" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup rust
        uses: ./.github/actions/setup-rust

      - name: Download binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./dashboard-app
        run: pnpm download:binaries

      - name: Sanitize version for MSI compatibility
        if: runner.os == 'Windows'
        shell: bash
        working-directory: ./dashboard-app
        run: |
          RAW="${{ env.APP_VERSION }}"
          # MSI requires numeric-only pre-release identifiers (<= 65535)
          # Convert e.g. 0.21.0-rc.1 -> 0.21.0-1 (valid semver + MSI-compatible)
          if [[ "$RAW" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-[a-zA-Z]+\.([0-9]+)$ ]]; then
            MSI_VERSION="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
            echo "Sanitizing version for MSI: $RAW -> $MSI_VERSION"
            node -e "
              const fs = require('fs');
              const p = 'src-tauri/tauri.conf.json';
              const c = JSON.parse(fs.readFileSync(p, 'utf8'));
              c.version = '$MSI_VERSION';
              fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            "
            sed -i "s/^version = \"$RAW\"/version = \"$MSI_VERSION\"/" src-tauri/Cargo.toml
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          projectPath: dashboard-app
          tagName: app-v${{ env.APP_VERSION }}
          releaseName: "ROZOOM v${{ env.APP_VERSION }}"
          releaseBody: |
            ## Artifacts

            | Platform | Architecture | Artifacts |
            |----------|-------------|-----------|
            | **macOS** | ARM64 (M1+) | `.dmg`, `.app.tar.gz` |
            | **Linux** | x64 | `.deb`, `.rpm`, `.AppImage` |
            | **Windows** | x64 | `.msi`, `.exe` (NSIS) |

            Download the package matching your OS and architecture.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build AppImage (best-effort, linuxdeploy plugin can be unstable)
        if: runner.os == 'Linux'
        continue-on-error: true
        working-directory: ./dashboard-app
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: pnpm tauri build --bundles appimage

      - name: Upload AppImage to draft release
        if: runner.os == 'Linux'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-v${{ env.APP_VERSION }}
          draft: true
          files: dashboard-app/src-tauri/target/release/bundle/appimage/*.AppImage

name: "Setup PNPM Action"
description: "This action sets up PNPM for use in workflows."
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: "pnpm"
        cache-dependency-path: ./dashboard-app/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: ./dashboard-app
      run: pnpm install --frozen-lockfile

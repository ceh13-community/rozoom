<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 160" width="640" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#1a2a5a"/>
      <stop offset="60%" stop-color="#0d1840"/>
      <stop offset="100%" stop-color="#060c24"/>
    </radialGradient>

    <!-- Helm wheel gradient -->
    <radialGradient id="hw" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#90c8ff"/>
      <stop offset="55%"  stop-color="#2068d8"/>
      <stop offset="100%" stop-color="#0a2a90"/>
    </radialGradient>
    <radialGradient id="hh" cx="38%" cy="32%" r="65%">
      <stop offset="0%"  stop-color="#4888d8"/>
      <stop offset="100%" stop-color="#0b2880"/>
    </radialGradient>

    <!-- Letter gradient -->
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d8eeff"/>
      <stop offset="18%"  stop-color="#88c4fa"/>
      <stop offset="50%"  stop-color="#2578e8"/>
      <stop offset="82%"  stop-color="#1040b8"/>
      <stop offset="100%" stop-color="#0820a0"/>
    </linearGradient>

    <!-- Letter shine (top gloss strip) -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity=".5"/>
      <stop offset="55%"  stop-color="white" stop-opacity=".05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Letter glow filter -->
    <filter id="glow" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 .08  0 0 0 0 .3  0 0 0 0 1  0 0 0 .45 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Depth shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0028c0" flood-opacity=".7"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3"  flood-color="#00104a" flood-opacity=".5"/>
    </filter>

    <!-- Clip for shine (upper portion of letters only) -->
    <clipPath id="sc">
      <rect x="180" y="20" width="460" height="42"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" fill="url(#bg)"/>

  <!-- Subtle ambient glow behind logo -->
  <ellipse cx="380" cy="72" rx="340" ry="68" fill="#1a40c8" opacity=".07"/>

  <!-- ── Helm wheel (centre 78,80) ── -->
  <g filter="url(#shadow)">
    <!-- outer glow ring -->
    <circle cx="78" cy="80" r="52" fill="none" stroke="#2060d0" stroke-width="1" opacity=".3"/>
    <!-- 8 spokes -->
    <line x1="78" y1="24" x2="78" y2="136" stroke="url(#hw)" stroke-width="8" stroke-linecap="round"/>
    <line x1="22" y1="80" x2="134" y2="80" stroke="url(#hw)" stroke-width="8" stroke-linecap="round"/>
    <line x1="38" y1="40" x2="118" y2="120" stroke="url(#hw)" stroke-width="8" stroke-linecap="round"/>
    <line x1="118" y1="40" x2="38"  y2="120" stroke="url(#hw)" stroke-width="8" stroke-linecap="round"/>
    <!-- rim -->
    <circle cx="78" cy="80" r="44" fill="none" stroke="url(#hw)" stroke-width="11"/>
    <!-- spoke-tip knobs -->
    <circle cx="78"  cy="24"  r="5.5" fill="url(#hw)"/>
    <circle cx="78"  cy="136" r="5.5" fill="url(#hw)"/>
    <circle cx="22"  cy="80"  r="5.5" fill="url(#hw)"/>
    <circle cx="134" cy="80"  r="5.5" fill="url(#hw)"/>
    <circle cx="38"  cy="40"  r="5.5" fill="url(#hw)"/>
    <circle cx="118" cy="40"  r="5.5" fill="url(#hw)"/>
    <circle cx="38"  cy="120" r="5.5" fill="url(#hw)"/>
    <circle cx="118" cy="120" r="5.5" fill="url(#hw)"/>
    <!-- hub -->
    <circle cx="78" cy="80" r="20" fill="url(#hh)"/>
    <circle cx="78" cy="80" r="20" fill="none" stroke="#5a9cdd" stroke-width="1.5" opacity=".4"/>
    <circle cx="78" cy="80" r="13" fill="#070e30"/>
    <!-- hub label -->
    <text x="78" y="84" text-anchor="middle"
          font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700"
          fill="#2468d8">k8s</text>
    <!-- hub gloss -->
    <ellipse cx="70" cy="68" rx="9" ry="5" fill="white" opacity=".18" transform="rotate(-25,70,68)"/>
    <!-- rim gloss arc -->
    <path d="M 48 44 A 44 44 0 0 1 108 44" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity=".22"/>
  </g>

  <!-- ── ROZOOM letters ── -->
  <g filter="url(#glow)">
    <!-- depth ghost -->
    <text x="166" y="104" font-family="Impact,'Arial Black',sans-serif"
          font-size="88" font-weight="900" fill="#04128a" opacity=".4"
          transform="translate(0,4)">ROZOOM</text>

    <!-- main fill -->
    <text x="166" y="104" font-family="Impact,'Arial Black',sans-serif"
          font-size="88" font-weight="900" fill="url(#lg)"
          filter="url(#shadow)">ROZOOM</text>

    <!-- shine overlay -->
    <g clip-path="url(#sc)">
      <text x="166" y="104" font-family="Impact,'Arial Black',sans-serif"
            font-size="88" font-weight="900" fill="url(#shine)">ROZOOM</text>
    </g>

    <!-- top edge highlight -->
    <text x="166" y="104" font-family="Impact,'Arial Black',sans-serif"
          font-size="88" font-weight="900" fill="none"
          stroke="#a8d4ff" stroke-width="1" opacity=".4">ROZOOM</text>
  </g>

  <!-- ── Tag pills ── -->
  <!-- K8s -->
  <rect x="168" y="114" width="46" height="22" rx="4"
        fill="rgba(30,80,255,.1)" stroke="rgba(59,135,255,.35)" stroke-width="1"/>
  <text x="191" y="129" text-anchor="middle"
        font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700"
        fill="#5ea3ff">K8s</text>

  <!-- Linter -->
  <rect x="222" y="114" width="60" height="22" rx="4"
        fill="rgba(34,211,160,.08)" stroke="rgba(34,211,160,.28)" stroke-width="1"/>
  <text x="252" y="129" text-anchor="middle"
        font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700"
        fill="#22d3a0">Linter</text>

  <!-- IDE -->
  <rect x="290" y="114" width="42" height="22" rx="4"
        fill="rgba(240,176,64,.08)" stroke="rgba(240,176,64,.28)" stroke-width="1"/>
  <text x="311" y="129" text-anchor="middle"
        font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700"
        fill="#f0b040">IDE</text>
</svg>
